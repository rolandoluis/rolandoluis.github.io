<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>rolandoluis</title>
  <meta name="robots" content="noindex" />
  <script>
    (function () {
      const saved = localStorage.getItem("site_lang");
      const lang = (saved || navigator.language || "es").toLowerCase();
      const target = lang.startsWith("es") ? "/es/" : "/en/";
      window.location.replace(target);
    })();
  </script>
</head>

<body>
  <p>Redirecting…</p>
  <p>
    <a href="/es/">Español</a> · <a href="/en/">English</a>
  </p>
</body>
</html>
