<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Lilianne</title>
  <meta name="description" content="Aplicación interactiva para explorar la tabla periódica de los elementos." />

  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body class="lilianne-shell">

  <main class="lilianne-app"
        data-project-demo
        data-project-title="Lilianne"
        data-project-type="app"
        data-project-status="beta"
        data-project-category="Educational / Interactive UI"
        data-project-date="2026-03-22"
        data-project-tags="education,chemistry,interactive,ui"
        data-project-featured="true"
        data-project-stack="HTML,CSS,JavaScript,JSON">

    <!-- ================= HEADER ================= -->
    <header class="lilianne-header">
      <div class="lilianne-header-inner">
        <h1 class="lilianne-title">Lilianne</h1>
        <p class="lilianne-subtitle">
          Tabla periódica interactiva para exploración y aprendizaje
        </p>
      </div>
    </header>

    <!-- ================= MAIN LAYOUT ================= -->
    <section class="lilianne-layout">

      <!-- ===== TABLA ===== -->
      <div class="lilianne-table" id="periodicTable">
        <!-- grid generado dinámicamente -->
      </div>

      <!-- ===== PANEL ===== -->
      <aside class="lilianne-panel" id="elementPanel">
      
        <section class="lilianne-panel-controls">
          <div class="lilianne-search">
            <input
              type="text"
              id="searchInput"
              placeholder="Buscar por nombre, símbolo o número atómico..."
            />
          </div>
      
          <div class="lilianne-filters" id="filtersContainer">
            <!-- se generan dinámicamente -->
          </div>
        </section>
      
        <div class="panel-header">
          <div class="panel-symbol" id="elSymbol">Si</div>
          <div>
            <h2 id="elName">Silicio</h2>
            <span id="elNumber">14</span>
          </div>
          <div class="panel-body">
              <p><strong>Masa:</strong> <span id="elMass"></span></p>
              <p><strong>Categoría:</strong> <span id="elCategory"></span></p>
              <p><strong>Grupo:</strong> <span id="elGroup"></span></p>
              <p><strong>Periodo:</strong> <span id="elPeriod"></span></p>
              <p><strong>Estado:</strong> <span id="elState"></span></p>
          </div>
        </div>
        
        <section class="panel-education">
          <h3>Estructura electrónica</h3>
        
          <div class="edu-atom-card">
            <div class="edu-atom-visual" id="elAtomVisual"></div>
          
            <div class="edu-atom-info">
              <div class="edu-shell-list" id="elShellList"></div>
            
              
            </div>
          </div>
        </section>
        <div class="edu-config-block">
          <span class="edu-config-label"><strong>Configuración electrónica</strong></span>
          <code id="elElectronConfig"></code>
        </div>
        <div class="panel-content" id="panelContent">        
          <div class="panel-scroll">
            
            <p class="panel-summary" id="elSummary"></p>
            <div class="panel-footer">
              <a id="elWiki" target="_blank" rel="noopener">Ver en Wikipedia</a>
            </div>
          </div>
        </div>
      
      </aside>

    </section>

  </main>

  <script src="./app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("embed") === "projects") {
      document.documentElement.classList.add("embed-projects");
      document.body.classList.add("embed-projects");
    }
  </script>
</body>
</html>
